<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Store - Gestion Catalogue</title>
    <!-- Chargement des scripts Firebase (v9 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <!-- Section Connexion / Administration -->
    <div id="auth-section" style="padding: 20px; border: 1px solid #ccc; max-width: 400px; margin: 20px auto; text-align: center;">
        <h3 id="auth-title">Connexion Admin</h3>
        
        <!-- Formulaire visible quand l'utilisateur est déconnecté -->
        <div id="login-form">
            <input type="email" id="email" placeholder="Votre e-mail (ex: labaguettenguessan@gmail.com)" style="width: 80%; padding: 8px; margin-bottom: 10px;"><br>
            <input type="password" id="password" placeholder="Votre mot de passe" style="width: 80%; padding: 8px; margin-bottom: 10px;"><br>
            <button id="btn-login" onclick="login()" style="padding: 8px 20px; background-color: #007bff; color: white; border: none; cursor: pointer;">Connexion</button>
        </div>

        <!-- Message et bouton visibles quand l'utilisateur est connecté -->
        <div id="admin-logged" style="display: none;">
            <p>Connecté en tant que : <strong id="user-display"></strong></p>
            <button onclick="logout()" style="padding: 8px 20px; background-color: #dc3545; color: white; border: none; cursor: pointer;">Déconnexion</button>
        </div>
    </div>

    <!-- Section Formulaire Produit (Visible uniquement pour l'admin connecté) -->
    <div id="catalog-management" style="display: none; padding: 20px; max-width: 500px; margin: 20px auto; border: 1px solid #007bff;">
        <h3>Ajouter un produit au catalogue</h3>
        <input type="text" id="prod-name" placeholder="Nom du produit" style="width: 80%; padding: 8px; margin-bottom: 10px;"><br>
        <input type="number" id="prod-price" placeholder="Prix" style="width: 80%; padding: 8px; margin-bottom: 10px;"><br>
        <button onclick="addProduct()" style="padding: 8px 20px; background-color: #28a745; color: white; border: none; cursor: pointer;">Ajouter le produit</button>
    </div>

    <script>
        // CONFIGURATION FIREBASE (Remplace avec tes propres clés Firebase de ton projet)
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "axis-store-829fb.firebaseapp.com",
            databaseURL: "https://axis-store-829fb-default-rtdb.firebaseio.com",
            projectId: "axis-store-829fb",
            storageBucket: "axis-store-829fb.appspot.com",
            messagingSenderId: "TON_SENDER_ID",
            appId: "TON_APP_ID"
        };

        // Initialisation de Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Écouter l'état de la connexion (savoir si l'admin est connecté ou non)
        auth.onAuthStateChanged(user => {
            if (user) {
                // Admin connecté
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-logged').style.display = 'block';
                document.getElementById('catalog-management').style.display = 'block';
                document.getElementById('user-display').innerText = user.email;
                document.getElementById('auth-title').innerText = "Espace Admin";
            } else {
                // Admin déconnecté
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('admin-logged').style.display = 'none';
                document.getElementById('catalog-management').style.display = 'none';
                document.getElementById('auth-title').innerText = "Connexion Admin";
            }
        });

        // Fonction de connexion
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("Connexion réussie !");
                })
                .catch((error) => {
                    alert("Erreur de connexion : " + error.message);
                });
        }

        // Fonction de déconnexion
        function logout() {
            auth.signOut().then(() => {
                alert("Vous êtes déconnecté.");
            });
        }

        // Fonction pour ajouter un produit dans la base de données sécurisée
        function addProduct() {
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;

            if(name === "" || price === "") {
                alert("Veuillez remplir tous les champs");
                return;
            }

            // Envoi vers le nœud "products" configuré dans tes règles
            db.ref('products').push({
                name: name,
                price: price
            })
            .then(() => {
                alert("Produit ajouté avec succès !");
                document.getElementById('prod-name').value = "";
                document.getElementById('prod-price').value = "";
            })
            .catch((error) => {
                alert("Erreur d'écriture : " + error.message);
            });
        }
    </script>
</body>
</html>
