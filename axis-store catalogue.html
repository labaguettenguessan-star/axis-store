<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Store</title>
    <!-- Chargement de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .admin-box { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>Bienvenue sur Axis Store</h1>

    <!-- ZONE D'ADMINISTRATION (Visible publiquement pour se connecter, mais le formulaire d'ajout reste caché) -->
    <div class="admin-box">
        <!-- Formulaire de connexion -->
        <div id="login-form">
            <input type="email" id="email" placeholder="Email Admin">
            <input type="password" id="password" placeholder="Mot de passe">
            <button onclick="login()">Connexion Admin</button>
        </div>

        <!-- Statut connecté et bouton d'ajout (Cachés par défaut) -->
        <div id="admin-logged" class="hidden">
            <p>Connecté en tant que admin (<span id="user-display"></span>) <button onclick="logout()">Déconnexion</button></p>
            
            <div style="margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px;">
                <h3>Ajouter un produit</h3>
                <input type="text" id="prod-name" placeholder="Nom du produit">
                <input type="number" id="prod-price" placeholder="Prix">
                <button onclick="addProduct()">Publier sur le site</button>
            </div>
        </div>
    </div>

    <!-- CATALOGUE PUBLIC (Toujours visible par tout le monde) -->
    <h2>Notre Catalogue</h2>
    <div id="catalog-grid" class="grid">
        <!-- Les produits vont s'afficher ici automatiquement -->
        <p id="loading-text">Chargement des produits...</p>
    </div>

    <script>
        // Ta configuration Firebase
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "axis-store-829fb.firebaseapp.com",
            databaseURL: "https://axis-store-829fb-default-rtdb.firebaseio.com",
            projectId: "axis-store-829fb",
            storageBucket: "axis-store-829fb.appspot.com",
            messagingSenderId: "TON_SENDER_ID",
            appId: "TON_APP_ID"
        };

        // Initialisation
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. CHARGEMENT PUBLIC DU CATALOGUE (S'exécute pour TOUT LE MONDE)
        db.ref('products').on('value', (snapshot) => {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = ''; // On vide le texte de chargement
            
            if (!snapshot.exists()) {
                grid.innerHTML = '<p>Aucun produit disponible pour le moment.</p>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const product = childSnapshot.val();
                grid.innerHTML += `
                    <div class="card">
                        <h3>${product.name}</h3>
                        <p>${product.price} FCFA</p>
                    </div>
                `;
            });
        });

        // 2. SURVEILLANCE DE LA CONNEXION (Affiche les outils d'ajout uniquement pour toi)
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('admin-logged').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
            } else {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('admin-logged').classList.add('hidden');
            }
        });

        // Connexion
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password)
                .catch(err => alert("Erreur : " + err.message));
        }

        // Déconnexion
        function logout() {
            auth.signOut();
        }

        // Ajouter un produit (Sécurisé par tes règles Firebase)
        function addProduct() {
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;

            if(!name || !price) return alert("Remplis tous les champs");

            db.ref('products').push({ name, price })
                .then(() => {
                    document.getElementById('prod-name').value = '';
                    document.getElementById('prod-price').value = '';
                })
                .catch(err => alert("Action refusée : " + err.message));
        }
    </script>
</body>
</html>
