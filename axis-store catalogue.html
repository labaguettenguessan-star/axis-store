<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - AXIS STORE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            line-height: 1.5; 
            color: #333; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #101010; 
            font-size: 16px;
            padding-top: 90px;
        }
        h1 { text-align: center; color: #39ff14; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; text-align: right; margin-bottom: 2px; order: 2; }
        .logo span { color: #39ff14; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #070707; 
            color: #fff; 
            padding: 15px 20px; 
            margin-bottom: 20px; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 1px solid #222;
        }
        nav { order: 1; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: #fff; text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
        nav a:hover { color: #39ff14; }

        @media (max-width: 768px) {
            header { padding: 12px; }
            header nav { width: 100%; }
            header nav ul { display: flex; justify-content: space-around; width: 100%; padding: 0; margin: 0; list-style: none; gap: 10px; }
            header nav ul li a { font-size: 13px; padding: 5px 5px; }
            .logo { display: none; }
        }

        .main-container { display: flex; flex-direction: column; gap: 25px; }

        .catalog-container { flex: 3; }
        .catalog-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        
        .product-card { 
            border: 1px solid #222; 
            border-radius: 10px; 
            overflow: hidden; 
            background: #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            position: relative;
        }
        .product-card:hover { transform: translateY(-3px); }
        
        .image-container { 
            position: relative; 
            width: 100%; 
            height: 240px; 
            background: #f0f0f0; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-container img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }

        .badge-expert { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: #e67e22; 
            color: white; 
            font-size: 0.75em; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-weight: bold;
            z-index: 5;
        }

        .product-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .brand { font-size: 0.8em; text-transform: uppercase; color: #888; font-weight: bold; letter-spacing: 1px; }
        .model-name { font-size: 1.1em; font-weight: bold; color: #111; }
        .price { font-size: 1.2em; font-weight: bold; color: #2c3e50; }
        .expert-note { background: #f9f9f9; padding: 10px; border-left: 3px solid #111; font-size: 0.85em; color: #555; border-radius: 0 4px 4px 0; }
        
        .options-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 5px; }
        .option-group { display: flex; flex-direction: column; gap: 4px; }
        .option-group label { font-size: 0.8em; font-weight: bold; color: #555; }
        .option-select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; background: #fff; width: 100%; cursor: pointer; }

        .btn-add { display: block; text-align: center; background: #111; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 0.9em; margin-top: auto; cursor: pointer; transition: background 0.2s; width: 100%; }
        .btn-add:hover { background: #333; }

        .cart-container { flex: 1; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; height: max-content; position: sticky; top: 100px; }
        .cart-container h2 { font-size: 1.3em; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #111; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; font-size: 0.95em; }
        .cart-item-meta { font-size: 0.8em; color: #666; display: block; margin-top: 2px; }
        
        .btn-remove { background: none; border: none; cursor: pointer; font-size: 1.2rem; display: inline-block; line-height: 1; padding: 2px 5px; }
        .cart-total { font-size: 1.2em; font-weight: bold; margin-top: 15px; text-align: right; color: #111; }
        
        .form-group { margin-top: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.85em; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }

        .cart-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-order { flex: 2; background: #25D366; color: white; border: none; padding: 12px; font-size: 0.95em; font-weight: bold; cursor: pointer; border-radius: 6px; text-align: center; text-decoration: none; }
        .btn-order:hover { background: #128c7e; }
        .btn-cancel { flex: 1; background: #e74c3c; color: white; border: none; padding: 12px; font-size: 0.95em; font-weight: bold; cursor: pointer; border-radius: 6px; text-align: center; }

        footer { text-align: center; padding: 20px; margin-top: 40px; color: #666; border-top: 1px solid #222; }

        @media (min-width: 768px) { body { font-size: 18px; } }
        @media (min-width: 1024px) { 
            body { font-size: 20px; } 
            .main-container { flex-direction: row; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Accueil</a></li>
                <li><a href="#" id="cart-nav-btn">🛒 Panier (<span id="cart-count-nav">0</span>)</a></li>
                <li><a href="https://wa.me/2250720648060" target="_blank">Contact</a></li>
            </ul>
        </nav>
        <div class="logo">AXIS <span>STORE</span></div>
    </header>

    <h1>NOTRE CATALOGUE</h1>
    <p class="subtitle">Revendeur officiel.</p>

    <div class="main-container">
        <div class="catalog-container">
            <div class="catalog-grid" id="catalog-products">
                <p style="color: #fff; text-align: center; width: 100%;">Chargement du catalogue...</p>
            </div>
        </div>

        <div id="cart-section" class="cart-container">
            <h2>Mon Panier (<span id="cart-count">0</span>)</h2>
            <div id="cart-items" style="margin-top: 15px;">
                <p style="color: #888; font-style: italic;">Votre panier est vide.</p>
            </div>
            <div class="cart-total">Total: <span id="cart-total">0</span> FCFA</div>

            <div class="form-group">
                <label for="client-name">Votre Nom :</label>
                <input type="text" id="client-name" placeholder="Ex: Jean punk">
            </div>
            <div class="form-group">
                <label for="client-phone">Numéro de Téléphone :</label>
                <input type="tel" id="client-phone" placeholder="Ex: 0720648060">
            </div>
            <div class="form-group">
                <label for="client-delivery">Adresse de livraison :</label>
                <input type="text" id="client-delivery" placeholder="Ex: Abidjan, Cocody">
            </div>

            <div class="cart-actions">
                <button class="btn-cancel" onclick="clearCart()">Décommander</button>
                <button class="btn-order" onclick="sendOrder()">Commander</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 AXIS STORE. QUALITÉ ASSURÉE. BY PANDOR AGENCY</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8mFRkNYjYTF_g4AWttKrHccY9H-AWN54",
            authDomain: "axis-store-829fb.firebaseapp.com",
            databaseURL: "https://axis-store-829fb-default-rtdb.firebaseio.com/",
            projectId: "axis-store-829fb",
            storageBucket: "axis-store-829fb.firebasestorage.app",
            messagingSenderId: "724482318031",
            appId: "1:724482318031:web:c3448b95d73b4f0fade1ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.MERCHANT_NUMBER = "2250720648060"; 
        window.cart = [];
        window.productsData = [];

        // Synchronisation Firebase en temps réel
        const productsRef = ref(db, 'products');
        onValue(productsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Filtrer pour ne garder que les produits valides (avec au moins un nom)
                window.productsData = Object.entries(data)
                    .map(([key, value]) => ({ key, ...value }))
                    .filter(p => p.name && p.name.trim() !== "");
                renderCatalog();
            } else {
                document.getElementById('catalog-products').innerHTML = `<p style="color: #fff; text-align: center; width: 100%;">Aucun produit disponible.</p>`;
            }
        });

        window.renderCatalog = function() {
            const catalogContainer = document.getElementById('catalog-products');
            if (!catalogContainer) return;
            catalogContainer.innerHTML = "";

            if (window.productsData.length === 0) {
                catalogContainer.innerHTML = `<p style="color: #fff; text-align: center; width: 100%;">Aucun produit disponible pour le moment.</p>`;
                return;
            }

            window.productsData.forEach(prod => {
                const category = (prod.category || 'habit').toLowerCase();
                const key = prod.key || prod.id;
                const basePrice = parseInt(prod.price) || 0;
                const safeName = prod.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const imageSrc = prod.image || 'https://via.placeholder.com/300?text=Pas+d+image';
                const badgeText = prod.badge ? `<span class="badge-expert">${prod.badge}</span>` : '';

                let optionsHtml = '';
                let defaultExtra = 0;

                // Génération des options selon la catégorie
                if (category === 'habit') {
                    const sc = prod.suppCoton || 0;
                    const sn = prod.suppNylon || 0;
                    defaultExtra = prod.qualityType === "nylon" ? sn : sc;

                    optionsHtml = `
                        <div class="option-group">
                            <label for="size-${key}">Taille :</label>
                            <select id="size-${key}" class="option-select">
                                <option value="S">S</option>
                                <option value="M" selected>M</option>
                                <option value="L">L</option>
                                <option value="XL">XL</option>
                            </select>
                        </div>
                        <div class="option-group">
                            <label for="quality-${key}">Matière / Qualité :</label>
                            <select id="quality-${key}" class="option-select" onchange="adjustPrice('${key}', ${basePrice})">
                                <option value="Coton" data-extra="${sc}" ${prod.qualityType !== 'nylon' ? 'selected' : ''}>Coton (+${sc} FCFA)</option>
                                <option value="Nylon" data-extra="${sn}" ${prod.qualityType === 'nylon' ? 'selected' : ''}>Nylon (+${sn} FCFA)</option>
                            </select>
                        </div>`;
                } else if (category === 'chaussure') {
                    const sizes = (prod.sizes || '38,39,40,41,42,43,44,45').split(',');
                    const suppSemelle = prod.suppSemelle || 0;
                    
                    let sizesOptions = sizes.map(s => `<option value="${s.trim()}">${s.trim()}</option>`).join('');

                    optionsHtml = `
                        <div class="option-group">
                            <label for="size-${key}">Pointure :</label>
                            <select id="size-${key}" class="option-select">${sizesOptions}</select>
                        </div>
                        <div class="option-group">
                            <label for="quality-${key}">Option Semelle :</label>
                            <select id="quality-${key}" class="option-select" onchange="adjustPrice('${key}', ${basePrice})">
                                <option value="Semelle Standard" data-extra="0" selected>Standard (+0 FCFA)</option>
                                <option value="Semelle Orthopédique" data-extra="${suppSemelle}">Orthopédique (+${suppSemelle} FCFA)</option>
                            </select>
                        </div>`;
                } else if (category === 'lunette') {
                    const suppPolarise = prod.suppPolarise || 0;
                    optionsHtml = `
                        <div class="option-group">
                            <label for="size-${key}">Monture :</label>
                            <select id="size-${key}" class="option-select"><option value="Standard">${prod.frameMaterial || 'Acétate'}</option></select>
                        </div>
                        <div class="option-group">
                            <label for="quality-${key}">Verres :</label>
                            <select id="quality-${key}" class="option-select" onchange="adjustPrice('${key}', ${basePrice})">
                                <option value="Verres Classiques" data-extra="0" selected>Classiques (+0 FCFA)</option>
                                <option value="Verres Polarisés" data-extra="${suppPolarise}">Polarisés (+${suppPolarise} FCFA)</option>
                            </select>
                        </div>`;
                } else if (category === 'sac') {
                    const suppCuir = prod.suppCuir || 0;
                    optionsHtml = `
                        <div class="option-group">
                            <label for="size-${key}">Matière :</label>
                            <select id="size-${key}" class="option-select"><option value="Standard">${prod.bagMaterial || 'Cuir Synthétique'}</option></select>
                        </div>
                        <div class="option-group">
                            <label for="quality-${key}">Finition :</label>
                            <select id="quality-${key}" class="option-select" onchange="adjustPrice('${key}', ${basePrice})">
                                <option value="Standard" data-extra="0" selected>Standard (+0 FCFA)</option>
                                <option value="Cuir Véritable" data-extra="${suppCuir}">Cuir Véritable (+${suppCuir} FCFA)</option>
                            </select>
                        </div>`;
                } else if (category === 'montre') {
                    const suppAcier = prod.suppAcier || 0;
                    optionsHtml = `
                        <div class="option-group">
                            <label for="size-${key}">Bracelet :</label>
                            <select id="size-${key}" class="option-select"><option value="Standard">${prod.strapType || 'Cuir'}</option></select>
                        </div>
                        <div class="option-group">
                            <label for="quality-${key}">Matériau :</label>
                            <select id="quality-${key}" class="option-select" onchange="adjustPrice('${key}', ${basePrice})">
                                <option value="Standard" data-extra="0" selected>Standard (+0 FCFA)</option>
                                <option value="Acier Inoxydable" data-extra="${suppAcier}">Acier Inox (+${suppAcier} FCFA)</option>
                            </select>
                        </div>`;
                }

                const finalPrice = basePrice + defaultExtra;

                catalogContainer.innerHTML += `
                    <div class="product-card">
                        <div class="image-container">
                            ${badgeText}
                            <img src="${imageSrc}" alt="${prod.name}" onerror="this.src='https://via.placeholder.com/300?text=Image+Non+Disponible'">
                        </div>
                        <div class="product-info">
                            <span class="brand">${category}</span>
                            <div class="model-name">${prod.name}</div>
                            <div class="price" id="display-price-${key}">${finalPrice.toLocaleString()} FCFA</div>
                            <div class="expert-note"><strong>Avis Revendeur :</strong> produit de qualité supérieure.</div>
                            
                            <div class="options-container">
                                ${optionsHtml}
                            </div>
                            <button class="btn-add" onclick="prepareAddToCart('${key}', '${safeName}', ${basePrice})">AJOUTER AU PANIER</button>
                        </div>
                    </div>
                `;
            });
        }

        window.adjustPrice = function(key, originalPrice) {
            const qualityElement = document.getElementById(`quality-${key}`);
            const extra = parseInt(qualityElement.options[qualityElement.selectedIndex].getAttribute('data-extra')) || 0;
            const finalPrice = originalPrice + extra;
            document.getElementById(`display-price-${key}`).innerText = `${finalPrice.toLocaleString()} FCFA`;
        }

        window.prepareAddToCart = function(key, name, originalPrice) {
            const sizeEl = document.getElementById(`size-${key}`);
            const qualityEl = document.getElementById(`quality-${key}`);

            const size = sizeEl ? sizeEl.value : 'Standard';
            const qualityLabel = qualityEl ? qualityEl.options[qualityEl.selectedIndex].text.split(' (')[0] : 'Standard';
            const extra = qualityEl ? (parseInt(qualityEl.options[qualityEl.selectedIndex].getAttribute('data-extra')) || 0) : 0;

            window.addToCart(name, originalPrice + extra, size, qualityLabel);
        }

        window.addToCart = function(name, price, size, quality) {
            const existingItem = window.cart.find(item => item.name === name && item.size === size && item.quality === quality);
            if (existingItem) { 
                existingItem.quantity += 1; 
            } else { 
                window.cart.push({ name, price, size, quality, quantity: 1 }); 
            }
            window.updateCartUI();
        }

        window.removeFromCart = function(name, size, quality) {
            window.cart = window.cart.filter(item => !(item.name === name && item.size === size && item.quality === quality));
            window.updateCartUI();
        }

        window.clearCart = function() { 
            window.cart = []; 
            window.updateCartUI(); 
        }

        window.updateCartUI = function() {
            const cartItemsDiv = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            const countSpan = document.getElementById('cart-count');
            const countNavSpan = document.getElementById('cart-count-nav');
            let total = 0; 
            let totalItems = 0;

            if (window.cart.length === 0) {
                cartItemsDiv.innerHTML = '<p style="color: #888; font-style: italic;">Votre panier est vide.</p>';
                cartTotal.innerText = '0';
                if(countSpan) countSpan.innerText = '0';
                if(countNavSpan) countNavSpan.innerText = '0';
                return;
            }

            cartItemsDiv.innerHTML = '';
            window.cart.forEach(item => {
                total += item.price * item.quantity;
                totalItems += item.quantity;
                const safeName = item.name.replace(/'/g, "\\'");
                const safeQuality = item.quality.replace(/'/g, "\\'");
                cartItemsDiv.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <span>${item.name} (x${item.quantity})</span>
                            <span class="cart-item-meta">Option: ${item.size} | ${item.quality}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <strong>${(item.price * item.quantity).toLocaleString()} F</strong>
                            <button class="btn-remove" type="button" onclick="event.stopPropagation(); removeFromCart('${safeName}', '${item.size}', '${safeQuality}')" style="color:red; background:none; border:none; cursor:pointer;">❌</button>
                        </div>
                    </div>
                `;
            });
            cartTotal.innerText = total.toLocaleString();
            if(countSpan) countSpan.innerText = totalItems;
            if(countNavSpan) countNavSpan.innerText = totalItems;
        }

        window.sendOrder = function() {
            const name = document.getElementById('client-name').value.trim();
            const phone = document.getElementById('client-phone').value.trim();
            const delivery = document.getElementById('client-delivery').value.trim();
            if (window.cart.length === 0 || !name || !phone || !delivery) return alert("Remplissez vos informations (Nom, Téléphone, Adresse) et ajoutez des produits au panier.");

            let message = `🛒 *NOUVELLE COMMANDE AXIS STORE*\n\n👤 *Client :* ${name}\n📞 *Téléphone :* ${phone}\n📍 *Livraison :* ${delivery}\n\n📦 *Articles :*\n`;
            let total = 0;
            window.cart.forEach(item => {
                const subtotal = item.price * item.quantity; 
                total += subtotal;
                message += `- ${item.name} (x${item.quantity}) | Option: ${item.size} | ${item.quality} -> *${subtotal.toLocaleString()} FCFA*\n`;
            });
            message += `\n💰 *Total à payer : ${total.toLocaleString()} FCFA*`;
            window.open(`https://wa.me/${window.MERCHANT_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }

        document.getElementById('cart-nav-btn').addEventListener('click', function(e) {
            e.preventDefault(); 
            document.getElementById('cart-section').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
